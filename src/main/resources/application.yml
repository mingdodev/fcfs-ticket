server:
  port: 8080
  tomcat:
    connection-timeout: 30s # 30초 (클라이언트 타임아웃인 15초보다 길게)

payment:
  url: ${PAYMENT_URL:http://localhost:8081}
  client:
    max-connections-per-route: ${PAYMENT_CLIENT_MAX_CONNECTIONS_PER_ROUTE:200}
    max-connections-total: ${PAYMENT_CLIENT_MAX_CONNECTIONS_TOTAL:400}
    connection-request-timeout: ${PAYMENT_CLIENT_CONNECTION_REQUEST_TIMEOUT:15s}
    connect-timeout: ${PAYMENT_CLIENT_CONNECT_TIMEOUT:3s}
    read-timeout: ${PAYMENT_CLIENT_READ_TIMEOUT:10s}

spring:
  application:
    name: fcfs-ticket
  datasource:
    url: jdbc:mysql://localhost:3306/fcfs_ticket
    username: ticket
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000 # 30초
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
      dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    root: WARN
    com.example: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
