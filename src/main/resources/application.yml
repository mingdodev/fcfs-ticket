server:
  port: 8080
  tomcat:
    connection-timeout: 30s # 30초 (클라이언트 타임아웃인 15초보다 길게)

payment:
  url: ${PAYMENT_URL:http://localhost:8081}
  client:
    max-connections-per-route: ${PAYMENT_CLIENT_MAX_CONNECTIONS_PER_ROUTE:200}
    max-connections-total: ${PAYMENT_CLIENT_MAX_CONNECTIONS_TOTAL:400}
    connection-request-timeout: ${PAYMENT_CLIENT_CONNECTION_REQUEST_TIMEOUT:15s}
    connect-timeout: ${PAYMENT_CLIENT_CONNECT_TIMEOUT:3s}
    read-timeout: ${PAYMENT_CLIENT_READ_TIMEOUT:10s}

spring:
  application:
    name: fcfs-ticket
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  datasource:
    url: jdbc:mysql://localhost:3306/fcfs_ticket
    username: ticket
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000 # 30초
      maximum-pool-size: 30
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
      dialect: org.hibernate.dialect.MySQLDialect

ticket:
  inventory:
    ttl-seconds: 259200  # 3일
  compensation:
    retry-interval-ms: 60000  # 1분

resilience4j:
  ratelimiter:
    instances:
      payment:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 30s
  retry:
    instances:
      payment:
        max-attempts: 3
        wait-duration: 1000  # 1초
        interval-function: exponential  # exponential backoff
        exponential-backoff-multiplier: 2.0
  circuitbreaker:
    instances:
      payment:
        register-health-indicator: true
        failure-rate-threshold: 50  # 50% 실패율
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 10000  # 10초 (타임아웃과 동일)
        wait-duration-in-open-state: 30000  # 30초 후 half-open
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

logging:
  level:
    root: WARN
    com.example: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
