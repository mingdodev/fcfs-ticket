services:
  redis:
    image: redis:7-alpine
    container_name: fcfs-redis
    ports:
      - "6379:6379"
    networks:
      - fcfs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: fcfs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fcfs_ticket
      MYSQL_ALLOW_EMPTY_PASSWORD: 'false'
    ports:
      - "3306:3306"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fcfs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: mingdodev/fcfs-ticket:${TAG:-v0}
    container_name: fcfs-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fcfs_ticket
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      PAYMENT_URL: http://10.0.2.6:8081 # 실제 인프라 환경에서는 사설 ip 주입 필요
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fcfs-network

networks:
  fcfs-network:
    driver: bridge
